<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Profile</title>
    <style>
        body {
            background-image: url(https://png.pngtree.com/element_our/png_detail/20180918/colorful-infinity-logo-design-png_104063.jpg);
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }
        
        h1 {
            text-align: center;
            color: #ff007f;
            padding-top: 80px;
        }
        
        form {
            text-align: center;
        }
        
        input {
            height: 50px;
            width: 400px;
            border: 1px solid black;
            border-radius: 50px;
            background-color: black;
            padding: 30px;
            font-size: 20px;
            box-sizing: border-box;
            border: 2px solid #ff007f;
            box-shadow: 0 0 0 3px #0095f6, 0 0 0 4px #ff007f;
            color: white;
        }
        
        select {
            height: 50px;
            width: 400px;
            border: 1px solid black;
            border-radius: 50px;
            font-size: 20px;
            background-color: black;
            text-align: center;
            border: 2px solid #ff007f;
            box-shadow: 0 0 0 3px #0095f6, 0 0 0 4px #ff007f;
            color: grey;
        }
        
        address {
            height: 100px;
        }
        
        textarea {
            height: 100px;
            width: 400px;
            resize: none;
            padding: 35px 10px;
            border: 1px solid black;
            box-sizing: border-box;
            border-radius: 50px;
            background-color: black;
            border: 2px solid #ff007f;
            box-shadow: 0 0 0 3px #0095f6, 0 0 0 4px #ff007f;
            color: grey;
        }
        
         ::placeholder {
            text-align: center;
            font-size: 20px;
        }
        
        button {
            height: 40px;
            width: 100px;
            border: 1px solid black;
            border-radius: 15px;
            font-size: 20px;
            background-color: #ff007f;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: black;
            padding: 10px 20px;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            height: 70px;
            margin-bottom: 0;
            padding-bottom: 10px;
        }
        
        header .logo img {
            height: 90px;
        }
        
        nav {
            display: flex;
            gap: 5px;
            padding-right: 100px;
        }
        
        nav button {
            background-color: black;
            color: white;
            border: none;
            padding: 5px 10px;
            font-size: 15px;
            cursor: pointer;
        }
        
        nav button:hover {
            background-color: black;
        }
        
        ;
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <img src="https://png.pngtree.com/element_our/png_detail/20180918/colorful-infinity-logo-design-png_104063.jpg" alt="Logo">
        </div>
        <nav>
            <button type="button" onclick="window.location.href='openpage.html';"><b>Home</b></button>
            <button type="button" onclick="window.location.href='aboutus.html';"><b>About Us</b></button>
            <button type="button" onclick="window.location.href='helpus.html';"><b>Help us</b></button>
            <button><b>Profile</b></button>
        </nav>
    </header>

    <h1>
        <u>UPLOAD PROFILE</u>
    </h1><br><br>

    <form>
        <input type="text" id="name" name="name" placeholder="Name" required>
        <br><br><br>
        <input type="date" id="dob" name="dob" placeholder="Date of Birth" style="color: gray;" required>
        <br><br><br>
        <input type="email" id="mail" name="mail" placeholder="Email" required>
        <br><br><br>
        <input type="tel" id="phone" name="phone" placeholder="Mobile Number" required>
        <br><br><br>
        <textarea id="address" name="address" placeholder="Address"></textarea>
        <br><br><br>
        <select id="category" name="category" required>
            <option value="" disabled selected>Select Category</option>
            <option value="dance">Dance</option>
            <option value="singing">Singing</option>
            <option value="software">Software</option>
            <option value="kitchen">Kitchen</option>
            <option value="driving">Driving</option>
            <option value="designer">Designer</option>
            <option value="tailoring">Tailoring</option>
        </select>
        <br><br><br>
        <input type="file" id="file" name="file">

        <br><br><br>
        <button>Submit</button>
    </form>

</body>

</html>
